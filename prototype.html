const timeToMins = (t) => {
  const parts = t.split(' '); const ampm = parts[1];
  let [h,m] = parts[0].split(':').map(Number);
  if (ampm==='PM'&&h!==12) h+=12;
  if (ampm==='AM'&&h===12) h=0;
  return h*60+m;
};

const getDates = () => {
  const dates=[]; const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today=new Date();
  for(let i=0;i<7;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    dates.push({ label:i===0?'Today':i===1?'Tomorrow':days[d.getDay()], sublabel:`${months[d.getMonth()]} ${d.getDate()}`, full:i===0?'Today':`${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`, index:i });
  }
  return dates;
};

function LiveClock() {
  const [time, setTime] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
  const h=time.getHours(), m=time.getMinutes().toString().padStart(2,'0'), sec=time.getSeconds().toString().padStart(2,'0');
  const ampm=h>=12?'PM':'AM', dh=h%12||12;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date(); const rh=now.getHours(), rm=now.getMinutes();
  const a=rh>=12?'PM':'AM', dh2=rh%12||12, rm2=rm<30?'00':'30';
  const wkey=`${dh2}:${rm2} ${a}`;
  const w=HOURLY_WEATHER[wkey]||{temp:68,icon:'☀️',desc:'Sunny'};
  return (
    <div style={s.clockBox}>
      <div style={s.clockRow}>
        <div>
          <div style={s.clockTime}>{dh}:{m}<span style={s.clockSec}>:{sec}</span> <span style={s.clockAmpm}>{ampm}</span></div>
          <div style={s.clockDate}>{days[time.getDay()]}, {months[time.getMonth()]} {time.getDate()}</div>
        </div>
        <div style={s.weatherBox}>
          <div style={{fontSize:20}}>{w.icon}</div>
          <div style={{fontSize:15,fontWeight:800,color:C.text}}>{w.temp}°F</div>
          <div style={{fontSize:10,color:C.muted}}>{w.desc}</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('explore');
  const [screen, setScreen] = useState('search');
  const [groupSize, setGroupSize] = useState(2);
  const [startTime, setStartTime] = useState('12:00 PM');
  const [endTime, setEndTime] = useState('3:00 PM');
  const [holesFilter, setHolesFilter] = useState('any');
  const [zip, setZip] = useState('80202');
  const [radius, setRadius] = useState(20);
  const [selDate, setSelDate] = useState(getDates()[0]);
  const [results, setResults] = useState([]);
  const [selCourse, setSelCourse] = useState(null);
  const [selTime, setSelTime] = useState(null);
  const [favorites, setFavorites] = useState([1,4]);
  const [unread, setUnread] = useState(2);
  const [rounds, setRounds] = useState({ past:PAST_ROUNDS, upcoming:UPCOMING_ROUNDS });

  const search = () => {
    const sm=timeToMins(startTime), em=timeToMins(endTime);
    const r=COURSES.filter(c=>c.distance<=radius).filter(c=>holesFilter==='any'||c.holes.includes(parseInt(holesFilter))).map(c=>({...c,availableTimes:c.times.filter(t=>{const m=timeToMins(t);return m>=sm&&m<=em;})})).filter(c=>c.availableTimes.length>0).sort((a,b)=>a.distance-b.distance);
    setResults(r); setScreen('results');
  };

  const toggleFav = (id) => setFavorites(p=>p.includes(id)?p.filter(f=>f!==id):[...p,id]);
  const saveScore = (id, score) => setRounds(p=>({...p,past:p.past.map(r=>r.id===id?{...r,score}:r)}));

  const goTab = (t) => { setTab(t); if(t==='explore') setScreen('search'); if(t==='profile') setUnread(0); };

  const renderScreen = () => {
    if(tab==='explore'){
      if(screen==='search') return <SearchScreen groupSize={groupSize} setGroupSize={setGroupSize} startTime={startTime} setStartTime={setStartTime} endTime={endTime} setEndTime={setEndTime} holesFilter={holesFilter} setHolesFilter={setHolesFilter} zip={zip} setZip={setZip} radius={radius} setRadius={setRadius} selDate={selDate} setSelDate={setSelDate} onSearch={search} />;
      if(screen==='results') return <ResultsScreen courses={results} groupSize={groupSize} startTime={startTime} endTime={endTime} radius={radius} zip={zip} selDate={selDate} favorites={favorites} toggleFav={toggleFav} onBack={()=>setScreen('search')} onSelect={(c)=>{setSelCourse(c);setSelTime(null);setScreen('detail');}} />;
      if(screen==='detail') return <DetailScreen course={selCourse} groupSize={groupSize} selTime={selTime} setSelTime={setSelTime} favorites={favorites} toggleFav={toggleFav} selDate={selDate} onBack={()=>setScreen('results')} onBook={()=>setScreen('grouppay')} />;
      if(screen==='grouppay') return <GroupPayScreen course={selCourse} groupSize={groupSize} selTime={selTime} selDate={selDate} onBack={()=>setScreen('detail')} onDone={()=>setScreen('confirm')} />;
      if(screen==='confirm') return <ConfirmScreen course={selCourse} groupSize={groupSize} selTime={selTime} selDate={selDate} onDone={()=>setScreen('search')} />;
    }
    if(tab==='rounds') return <RoundsScreen rounds={rounds} saveScore={saveScore} onBook={()=>{setTab('explore');setScreen('search');}} />;
    if(tab==='friends') return <FriendsScreen />;
    if(tab==='profile') return <ProfileScreen favorites={favorites} unread={unread} />;
    if(tab==='notifications') return <NotifScreen onBack={()=>setTab('profile')} />;
  };

  return (
    <div style={s.container}>
      <div style={s.scroll}><div style={s.content}>{renderScreen()}</div></div>
      <div style={s.bottomNav}>
        {[['explore','⛳','Explore'],['rounds','📅','Rounds'],['friends','👥','Friends'],['profile','👤','Profile']].map(([id,icon,label])=>(
          <button key={id} style={s.navItem} onClick={()=>goTab(id)}>
            <div style={{position:'relative'}}>
              <span style={{fontSize:20}}>{icon}</span>
              {id==='profile'&&unread>0&&<div style={{position:'absolute',top:-4,right:-8,background:C.red,borderRadius:10,minWidth:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}><span style={{fontSize:9,fontWeight:800,color:'white'}}>{unread}</span></div>}
            </div>
            <span style={{fontSize:9,fontWeight:600,color:tab===id?C.green:C.muted,marginTop:3}}>{label}</span>
            {tab===id&&<div style={s.navDot}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

function SearchScreen({groupSize,setGroupSize,startTime,setStartTime,endTime,setEndTime,holesFilter,setHolesFilter,zip,setZip,radius,setRadius,selDate,setSelDate,onSearch}) {
  const isValid=timeToMins(endTime)>timeToMins(startTime);
  const isZip=zip.length===5&&!isNaN(zip);
  const inRange=COURSES.filter(c=>c.distance<=radius).length;
  const dates=getDates();
  return (
    <div>

function GroupPayScreen({course,groupSize,selTime,selDate,onBack,onDone}) {
  const priceEach=(course.price+1.5).toFixed(2);
  const total=(parseFloat(priceEach)*groupSize).toFixed(2);
  const friends=FRIENDS_DATA.slice(0,groupSize-1);
  const [paidIds,setPaidIds]=useState([]);
  const [myPaid,setMyPaid]=useState(false);
  const [paying,setPaying]=useState(false);
  const [method,setMethod]=useState('apple');
  const paidCount=paidIds.length+(myPaid?1:0);
  const handleMyPay=()=>{setPaying(true);setTimeout(()=>{setPaying(false);setMyPaid(true);},1400);};
  useEffect(()=>{if(myPaid&&(friends.length===0||paidIds.length===friends.length))setTimeout(onDone,600);},[myPaid,paidIds]);
  return (
    <div>
      <button style={s.back} onClick={onBack}>← Back</button>
      <div style={s.heading}>Split the Cost 💸</div>
      <div style={s.subloc}>{course.name} · {selTime} · {selDate.full}</div>
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:12,color:C.muted,fontWeight:600}}>{paidCount} of {groupSize} paid</span>
          <span style={{fontSize:12,color:C.green,fontWeight:600}}>${(paidCount*parseFloat(priceEach)).toFixed(2)} / ${total}</span>
        </div>
        <div style={{backgroundColor:C.card2,borderRadius:20,height:7,overflow:'hidden'}}>
          <div style={{width:`${(paidCount/groupSize)*100}%`,height:'100%',background:`linear-gradient(90deg,${C.greenDark},${C.green})`,borderRadius:20,transition:'width 0.4s'}}/>
        </div>
      </div>
      <div style={s.priceBox}>
        <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:12,color:C.muted}}>Each player owes</span><span style={{fontSize:18,fontWeight:800,color:C.green}}>${priceEach}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}><span style={{fontSize:12,color:C.muted}}>Total ({groupSize} players)</span><span style={{fontSize:14,fontWeight:700,color:C.text}}>${total}</span></div>
      </div>
      <Lbl>YOUR PAYMENT METHOD</Lbl>
      <div style={s.row}>
        {[['apple','🍎 Apple Pay'],['venmo','💙 Venmo'],['card','💳 Card']].map(([id,label])=>(
          <div key={id} onClick={()=>setMethod(id)} style={{...s.pill,...(method===id?s.pillActive:{})}}>
            <span style={{...s.pillText,...(method===id?s.pillTextActive:{}),fontSize:11}}>{label}</span>
          </div>
        ))}
      </div>
      <Lbl>YOUR PAYMENT</Lbl>
      <div style={s.payCard}>
        <Avatar initials="ME" color={C.green}/>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>You</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{myPaid?'✅ Paid':`$${priceEach} due`}</div></div>
        {!myPaid?<button style={s.payBtn} onClick={handleMyPay}>{paying?'...':'💳 Pay'}</button>:<span style={{fontSize:12,fontWeight:700,color:C.green}}>✓ Paid</span>}
      </div>
      {friends.length>0&&<><Lbl>REQUEST FROM FRIENDS</Lbl>
        {friends.map(f=>(
          <div key={f.id} style={s.payCard}>
            <Avatar initials={f.initials} color={f.color}/>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.name}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{paidIds.includes(f.id)?'✅ Paid via Venmo':`${f.venmo} · $${priceEach}`}</div></div>
            {!paidIds.includes(f.id)?<button style={{...s.payBtn,backgroundColor:'rgba(61,149,206,0.15)',borderColor:'#3d95ce',color:'#3d95ce'}} onClick={()=>setPaidIds(p=>[...p,f.id])}>💙 Request</button>:<span style={{fontSize:12,fontWeight:700,color:C.green}}>✓ Paid</span>}
          </div>
        ))}</>}
      <div style={s.infoBox}><span style={{fontSize:12,color:C.muted}}>💡 Tapping Request sends a pre-filled Venmo request for ${priceEach} — your friend just confirms.</span></div>
    </div>
  );
}

function RoundsScreen({rounds,saveScore,onBook}) {
  const [editId,setEditId]=useState(null);
  const [scoreIn,setScoreIn]=useState('');
  const handleSave=(id)=>{const p=parseInt(scoreIn);if(!isNaN(p)&&p>0&&p<200){saveScore(id,p);setEditId(null);setScoreIn('');}};
  return (
    <div>
      <div style={s.logo}>⛳ TIMED</div>
      <div style={s.heading}>My Rounds</div>
      {rounds.upcoming.length>0&&<><Lbl>UPCOMING</Lbl>{rounds.upcoming.map(r=>(
        <div key={r.id} style={{...s.card,borderColor:C.greenDark}}>
          <div style={{fontSize:11,fontWeight:700,color:C.green,marginBottom:8}}>📅 Upcoming</div>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>{r.course}</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{r.date} · {r.time} · {r.holes} holes · {r.players} players</div>
          <div style={s.confirmRow}><span style={{fontSize:12,color:C.muted}}>🎫 {r.confirmation}</span><span style={{fontSize:12,fontWeight:600,color:C.text}}>${r.paid}/player</span></div>
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <button style={{...s.payBtn,flex:1}}>📲 View Ticket</button>
            <button style={{...s.payBtn,flex:1,backgroundColor:'rgba(248,113,113,0.1)',borderColor:'#7f1d1d',color:C.red}}>Cancel</button>
          </div>
        </div>
      ))}</>}
      <Lbl>PAST ROUNDS</Lbl>
      {rounds.past.map(r=>(
        <div key={r.id} style={s.card}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>{r.course}</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{r.date} · {r.time} · {r.holes} holes · {r.players} players</div>
          <div style={s.confirmRow}><span style={{fontSize:12,color:C.muted}}>🎫 {r.confirmation}</span><span style={{fontSize:12,fontWeight:600,color:C.text}}>${r.paid}/player</span></div>
          <div style={s.scoreSection}>
            {r.score?(
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={s.scoreBadge}>
                  <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:1}}>SCORE</div>
                  <div style={{fontSize:22,fontWeight:800,color:C.green}}>{r.score}</div>
                  <div style={{fontSize:11,color:C.muted}}>{r.score>72?`+${r.score-72}`:r.score<72?`-${72-r.score}`:'E'}</div>
                </div>
                <button style={{...s.payBtn,fontSize:11}} onClick={()=>{setEditId(r.id);setScoreIn(r.score.toString());}}>Edit Score</button>
              </div>
            ):editId===r.id?(
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input style={{flex:1,backgroundColor:C.card2,borderRadius:10,border:`1.5px solid ${C.greenDark}`,padding:'8px 12px',fontSize:15,fontWeight:700,color:C.text}} value={scoreIn} onChange={e=>setScoreIn(e.target.value)} placeholder="Enter score" maxLength={3} autoFocus/>
                <button style={s.payBtn} onClick={()=>handleSave(r.id)}>Save</button>
                <button style={{...s.payBtn,background:'none',border:'none',color:C.muted}} onClick={()=>setEditId(null)}>Cancel</button>
              </div>
            ):(
              <button style={{...s.payBtn,background:'none',border:'none',color:C.muted,padding:'6px 0'}} onClick={()=>{setEditId(r.id);setScoreIn('');}}>+ Log Your Score</button>
            )}
          </div>
        </div>
      ))}
      <button style={s.searchBtn} onClick={onBook}>⛳ Book a New Round</button>
    </div>
  );
}

        </div>
      ))}
      <button style={{...s.searchBtn,background:'transparent',border:`2px solid ${C.greenDark}`,color:C.green,marginTop:8}}>+ Invite Friends to Timed</button>
    </div>
  );
}

function FriendDetail({friend,onBack}) {
  return (
    <div>
      <button style={s.back} onClick={onBack}>← Back</button>
      <div style={{textAlign:'center',marginBottom:20}}>
        <Avatar initials={friend.initials} color={friend.color} size={64}/>
        <div style={{...s.heading,textAlign:'center',marginTop:10,marginBottom:4}}>{friend.name}</div>
        <div style={{...s.subloc,textAlign:'center'}}>{friend.venmo}</div>
      </div>
      <div style={s.statsRow}>
        {[[friend.rounds,'Rounds'],[friend.mutualCourses,'Mutual Courses'],['⛳','Golfer']].map(([v,l])=>(
          <div key={l} style={s.statBox}><div style={s.statVal}>{v}</div><div style={s.statLabel}>{l}</div></div>
        ))}
      </div>
      <div style={s.infoBox}><span style={{fontSize:13,color:C.muted}}>🏌️ Last played together at <span style={{color:C.green,fontWeight:600}}>{friend.lastPlayed}</span></span></div>
      <Lbl>QUICK ACTIONS</Lbl>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <button style={s.searchBtn}>⛳ Invite to a Round</button>
        <button style={{...s.searchBtn,background:'rgba(61,149,206,0.12)',border:'1.5px solid #3d95ce',color:'#3d95ce'}}>💙 Send Venmo Request</button>
        <button style={{...s.searchBtn,background:'transparent',border:`1.5px solid ${C.border}`,color:C.muted}}>📞 Call {friend.name.split(' ')[0]}</button>
      </div>
      <Lbl>COURSES YOU'VE BOTH PLAYED</Lbl>
      {COURSES.slice(0,friend.mutualCourses).map(c=>(
        <div key={c.id} style={{...s.card,padding:12}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{c.name}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>{c.city} · ★ {c.rating}</div>
        </div>
      ))}
    </div>
  );
}

function ProfileScreen({favorites,unread}) {
  const favCourses=COURSES.filter(c=>favorites.includes(c.id));
  return (
    <div>
      <div style={s.logo}>⛳ TIMED</div>
      <div style={{...s.card,textAlign:'center',padding:24,marginBottom:16}}>
        <Avatar initials="AG" color={C.green} size={60}/>
        <div style={{fontSize:20,fontWeight:700,color:C.text,marginTop:10,marginBottom:4}}>Agustin Rivas</div>
        <div style={{fontSize:12,color:C.muted}}>@agustin-rivas · Denver, CO 80202</div>
        <div style={{display:'inline-block',marginTop:10,padding:'5px 14px',backgroundColor:'rgba(82,183,136,0.1)',border:`1px solid ${C.greenDark}`,borderRadius:20,fontSize:11,fontWeight:700,color:C.green}}>⛳ 8 rounds booked on Timed</div>
      </div>
      <div style={s.statsRow}>
        {[['8','Rounds'],['4','Friends'],['2','Favorites']].map(([v,l])=>(
          <div key={l} style={s.statBox}><div style={s.statVal}>{v}</div><div style={s.statLabel}>{l}</div></div>
        ))}
      </div>
      <Lbl>❤️ FAVORITE COURSES</Lbl>
      {favCourses.length===0?<div style={s.infoBox}><span style={{fontSize:13,color:C.muted}}>No favorites yet — tap 🤍 on any course to save it here.</span></div>
        :favCourses.map(c=><div key={c.id} style={{...s.card,padding:12}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{c.name}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{c.city} · ${c.price}/player · ★ {c.rating}</div></div>)}
      <Lbl>NOTIFICATIONS {unread>0&&`(${unread} unread)`}</Lbl>
      {NOTIFICATIONS.slice(0,3).map(n=>(
        <div key={n.id} style={{...s.card,display:'flex',gap:10,padding:12,borderColor:n.unread?C.greenDark:C.border,backgroundColor:n.unread?'rgba(82,183,136,0.04)':C.card}}>
          <span style={{fontSize:18}}>{n.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:C.text,lineHeight:1.5,fontWeight:n.unread?600:400}}>{n.text}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>{n.time}</div>
          </div>
          {n.unread&&<div style={{width:7,height:7,borderRadius:4,backgroundColor:C.green,marginTop:4}}/>}
        </div>
      ))}
      <Lbl>SETTINGS</Lbl>
      {[['💳','Payment Methods','Visa ••4242, Apple Pay'],['📍','Home Location','Denver, CO 80202'],['🔔','Push Notifications','Enabled'],['📞','Help & Support','Contact us']].map(([icon,label,sub])=>(
        <div key={label} style={{...s.card,display:'flex',alignItems:'center',padding:12,marginBottom:6,cursor:'pointer'}}>
          <span style={{fontSize:18,marginRight:10}}>{icon}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{label}</div><div style={{fontSize:11,color:C.muted,marginTop:1}}>{sub}</div></div>
          <span style={{color:C.muted}}>›</span>
        </div>
      ))}
    </div>
  );
}

function NotifScreen({onBack}) {
  return (
    <div>
      <button style={s.back} onClick={onBack}>← Back</button>
      <div style={s.heading}>Notifications</div>
      {NOTIFICATIONS.map(n=>(
        <div key={n.id} style={{...s.card,display:'flex',gap:10,padding:14,borderColor:n.unread?C.greenDark:C.border}}>
          <span style={{fontSize:20}}>{n.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:C.text,lineHeight:1.5,fontWeight:n.unread?600:400}}>{n.text}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>{n.time}</div>
          </div>
          {n.unread&&<div style={{width:7,height:7,borderRadius:4,backgroundColor:C.green,marginTop:5}}/>}
        </div>
      ))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
